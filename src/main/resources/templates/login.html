<html>
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio de Sesión</title>
</head>
<body>
    <h1>Inicio de Sesión</h1>
    <p>Introduce los datos necesarios a continuación:</p>
    <form action="/login" method="post">
      <label for="nombre"> Nombre:</label>
      <input type="text" id="nombre" name="nombre" required>
      <label for="password"> Contraseña:</label>
      <input type="password" id="password" name="password" required>
      <button type="submit">Iniciar Sesión</button>
    </form>
</body>
</html>
<style>
    body { font-size: 16px; padding: 10px; margin: 0; }
    .login-box { width: 100%; max-width: 100%; padding: 20px; box-sizing: border-box; }
    input, button { width: 100%; padding: 12px; margin: 5px 0; font-size: 16px; }
</style>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
