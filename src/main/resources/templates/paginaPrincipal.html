<html>
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Principal UzamamaHouse</title>
    <style>
 table {
            border-collapse: collapse;
            width: 100%;
            margin-bottom: 20px;
        }
        
        table, th, td {
            border: 1px solid black;
        }
        
        th, td {
            padding: 8px;
            text-align: left;
        }
        
        th {
            background-color: #f2f2f2;
        }
        
        a {
            display: inline-block;
            margin: 5px 0;
            padding: 8px 12px;
            background-color: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }
        
        a.cerrar {
            background-color: #f44336;
        }
    </style>
</head>
<body>
    <h1>UzsamamaHouse <h1>Bienvenido, <span th:text="${usuario.nombre}">Usuario</span></h1>
    
    <h2>📅 Eventos</h2>
    <table border="1">
        <tr>
            <th>Título</th>
            <th>Fecha</th>
            <th>Estado</th>
        </tr>
        <tr th:each="evento : ${eventos}">
            <td th:text="${evento.titulo}">Título</td>
            <td th:text="${evento.fecha}">Fecha</td>
            <td th:text="${evento.estado}">Estado</td>
        </tr>
    </table>
    
    <h2>🛒 Lista de la compra</h2>
    <table border="1">
        <tr>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Estado</th>
        </tr>
        <tr th:each="compra : ${compras}">
            <td th:text="${compra.producto}">Producto</td>
            <td th:text="${compra.cantidad}">Cantidad</td>
            <td th:text="${compra.estado}">Estado</td>
        </tr>
    </table>
    
    <br>
    <a href="/compra/nuevo">➕ Añadir producto</a>
    <br>
    <a href="/evento/nuevo">📅 Añadir evento</a>
    <br><br>
    <a href="/logout">Cerrar sesión</a></h1>
   </body>
</html>
<style>
    body { font-size: 16px; padding: 10px; margin: 0; }
    .container { width: 100%; max-width: 100%; padding: 10px; box-sizing: border-box; }
    table { width: 100%; font-size: 14px; display: block; overflow-x: auto; }
    input, button { width: 100%; padding: 12px; margin: 5px 0; font-size: 16px; }
    .boton { width: 100%; margin: 5px 0; text-align: center; }
</style>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("/sw.js");
}
</script>
